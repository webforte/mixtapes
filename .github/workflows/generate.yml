name: Generate mixtapes

on:
  push:
    branches: [main]
    paths:
      - "playlists.yaml"
      - "overrides/**"
      - "scripts/**"
      - "pyproject.toml"
      - ".github/workflows/generate.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: generate-mixtapes
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history so git diff / git push reflect everything.
          fetch-depth: 0
          # Use GITHUB_TOKEN for the auto-commit step below.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Regenerate mixtapes
        run: python scripts/generate.py --config playlists.yaml

      - name: Commit and push regenerated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit."
            exit 0
          fi
          git add data docs
          git commit -m "chore(generate): regenerate mixtapes from playlists.yaml"
          git push
