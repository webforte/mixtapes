<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title | default: site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
    {% include head-custom.html %}
  </head>
  <body>
    <header class="site-header">
      {%- comment -%}
      The wordmark is intentionally not a link. Recipients shouldn't have a
      one-click path back to the top-level or tenant-overview pages — those
      list other tenants' content. Treat each mixtape page as standalone.
      {%- endcomment -%}
      <span class="wordmark">
        <img class="wordmark-logo" src="{{ '/assets/logo.png' | relative_url }}" alt="">
        <span>Mixtapes</span>
      </span>
    </header>

    <main class="site-main">
      {{ content }}
    </main>

    <footer class="site-footer"></footer>

    <script>
      // Open all external links in a new tab.
      document.querySelectorAll('a[href]').forEach(function (link) {
        try {
          var url = new URL(link.href, location.href);
          if (url.origin !== location.origin) {
            link.target = '_blank';
            link.rel = 'noopener noreferrer';
          }
        } catch (e) { /* ignore malformed hrefs */ }
      });
    </script>
  </body>
</html>
